services:
  app:
    build: .
    image: tungedng2710/tonrag:latest
    container_name: tonrag-app
    ports:
      - "7865:7865"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - UVICORN_WORKERS=1
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 7865
    restart: unless-stopped
